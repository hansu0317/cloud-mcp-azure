<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Notebook</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; font-size: 14px; }
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Header */
    header { flex-shrink: 0; display: flex; align-items: center; gap: 6px; height: 48px; padding: 0 14px; background: #0a0e18; border-bottom: 1px solid #1e2533; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 7px; margin-right: 4px; }
    .logo-icon { font-size: 18px; color: #6366f1; }
    .logo-text { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .h-div { width: 1px; height: 18px; background: #1e2533; margin: 0 6px; }
    .h-spacer { flex: 1; }
    .mode-tabs { display: flex; gap: 2px; background: #0f1117; border: 1px solid #1e2533; border-radius: 6px; padding: 2px; }
    .mode-tab { padding: 4px 14px; border-radius: 4px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: #475569; transition: all 0.15s; font-family: inherit; }
    .mode-tab.active { background: #1a1f30; color: #a5b4fc; }
    .mode-tab:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 6px; border: 1px solid #2a3144; background: transparent; color: #94a3b8; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
    .btn:hover { border-color: #6366f1; color: #a5b4fc; background: #1a1f30; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: #6366f1; border-color: #6366f1; color: #fff; }
    .btn.primary:hover { background: #5558e3; border-color: #5558e3; }
    .btn.danger:hover { border-color: #f87171; color: #f87171; background: #1a0a0a; }
    .btn-xs { padding: 2px 7px; font-size: 11px; border-radius: 4px; }
    .btn-sm { padding: 3px 9px; font-size: 11px; }
    .nb-only { display: flex; gap: 4px; }

    /* Body */
    .body { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar — Catalog */
    .sidebar { width: 260px; flex-shrink: 0; background: #0a0e18; border-right: 1px solid #1e2533; display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s; }
    .sidebar.collapsed { width: 0; border-right: none; }
    .sb-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 10px 8px; border-bottom: 1px solid #1e2533; flex-shrink: 0; }
    .sb-title { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; }
    .sb-header-actions { display: flex; gap: 4px; }
    .sb-body { flex: 1; overflow-y: auto; padding: 4px 0; }
    .sb-resizer { width: 4px; flex-shrink: 0; cursor: col-resize; background: transparent; }
    .sb-resizer:hover, .sb-resizer.active { background: #6366f1; }
    .sb-empty { padding: 10px 14px; font-size: 11px; color: #334155; }

    /* Catalog Tree */
    .cat-conn { margin-bottom: 2px; }
    .cat-conn-row { display: flex; align-items: center; gap: 6px; padding: 5px 10px; font-size: 12px; color: #64748b; cursor: pointer; user-select: none; transition: background 0.1s; }
    .cat-conn-row:hover { background: #0d1120; color: #94a3b8; }
    .cat-conn-chev { font-size: 8px; color: #334155; width: 10px; flex-shrink: 0; transition: transform 0.15s; }
    .cat-conn-chev.open { transform: rotate(90deg); }
    .cat-conn-icon { font-size: 12px; flex-shrink: 0; }
    .cat-conn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .cat-conn-status { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cat-conn-status.connected { background: #22c55e; }
    .cat-conn-status.error { background: #ef4444; }
    .cat-conn-status.unknown { background: #475569; }
    .cat-tables { display: none; }
    .cat-tables.open { display: block; }
    .cat-table-row { display: flex; align-items: center; gap: 5px; padding: 3px 10px 3px 26px; font-size: 11px; color: #64748b; cursor: pointer; user-select: none; transition: background 0.1s; }
    .cat-table-row:hover { background: #0d1120; color: #94a3b8; }
    .cat-table-icon { font-size: 10px; color: #6366f1; flex-shrink: 0; }
    .cat-table-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cat-table-cnt { font-size: 10px; color: #2a3a50; flex-shrink: 0; }
    .cat-table-add { opacity: 0; background: transparent; border: none; color: #475569; cursor: pointer; font-size: 13px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .cat-table-row:hover .cat-table-add { opacity: 1; }
    .cat-table-add:hover { color: #6366f1; }
    .cat-loading { padding: 5px 10px 5px 26px; font-size: 11px; color: #334155; }
    .cat-builtin { font-size: 9px; color: #2a3a50; background: #131825; border: 1px solid #1e2533; border-radius: 3px; padding: 1px 5px; flex-shrink: 0; }

    /* Notebook */
    #notebook-view { flex: 1; display: flex; overflow: hidden; }
    #notebook-view.hidden { display: none; }
    .notebook { flex: 1; overflow-y: auto; background: #0f1117; }
    .nb-inner { max-width: 1100px; margin: 0 auto; padding: 16px 20px 40px; }
    .cell { margin-bottom: 8px; border: 1px solid #1a2030; border-radius: 8px; overflow: hidden; background: #0d1120; transition: border-color 0.15s; }
    .cell:focus-within { border-color: #2a3a6e; }
    .cell.running { border-color: #312e81; }
    .cell.has-error { border-color: #7f1d1d; }
    .cell-hdr { display: flex; align-items: center; gap: 8px; padding: 5px 12px; background: #09111e; border-bottom: 1px solid #1a2030; min-height: 34px; }
    .badge { font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.06em; flex-shrink: 0; }
    .badge.ai  { background: #1e1b4b; color: #818cf8; border: 1px solid #3730a3; }
    .badge.sql { background: #132010; color: #6ee7b7; border: 1px solid #1a4a25; }
    .exec-num { font-size: 10.5px; color: #2a3a50; font-family: monospace; flex-shrink: 0; min-width: 42px; }
    .cell-preview { flex: 1; font-size: 11.5px; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cell-acts { display: flex; gap: 4px; flex-shrink: 0; }
    .cell-in { position: relative; }
    .cell-ta { width: 100%; padding: 10px 14px; background: transparent; border: none; outline: none; font-size: 13px; color: #e2e8f0; resize: none; line-height: 1.65; min-height: 52px; max-height: 280px; font-family: inherit; }
    .cell-in.sql .cell-ta { font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12.5px; color: #7dd3fc; tab-size: 2; }
    .cell-ta::placeholder { color: #1e2d3d; }
    .cell-out { border-top: 1px solid #1a2030; background: #07090f; }
    .cell-out.hidden { display: none; }
    .out-inner { padding: 12px 14px; }
    .running-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 12px; color: #475569; }
    .spinner { width: 15px; height: 15px; border: 2px solid #1e2533; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .out-answer { font-size: 13px; color: #b0c4d8; line-height: 1.75; margin-bottom: 12px; white-space: pre-wrap; word-break: break-word; }
    .out-sql { margin-bottom: 10px; }
    .out-sql-hdr { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #334155; cursor: pointer; padding: 3px 0; user-select: none; }
    .out-sql-hdr:hover { color: #64748b; }
    .sql-chev { font-size: 8px; }
    .out-sql-body { margin-top: 5px; background: #0f1117; border: 1px solid #1e2533; border-radius: 6px; padding: 10px 12px; overflow-x: auto; font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px; color: #7dd3fc; line-height: 1.65; white-space: pre; }
    .res-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .res-tabs { display: flex; gap: 2px; }
    .res-tab { padding: 3px 10px; border-radius: 4px; border: 1px solid #1e2533; font-size: 11px; color: #475569; cursor: pointer; background: transparent; transition: all 0.1s; font-family: inherit; }
    .res-tab.active { background: #131a28; color: #c8d8e8; border-color: #2a3a60; }
    .res-stats { font-size: 11px; color: #2a3a50; }
    .res-tbl { display: none; overflow-x: auto; max-height: 320px; overflow-y: auto; }
    .res-tbl.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { position: sticky; top: 0; z-index: 1; }
    th { background: #0b0f1c; color: #475569; font-weight: 600; text-align: left; padding: 6px 10px; border-bottom: 1px solid #1e2533; white-space: nowrap; }
    td { padding: 5px 10px; color: #94a3b8; border-bottom: 1px solid #0d1120; white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
    tr:hover td { background: #0d1120; }
    tr:last-child td { border-bottom: none; }
    .res-chart { display: none; }
    .res-chart.active { display: block; }
    .chart-cfg { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 8px 0 6px; }
    .chart-cfg label { font-size: 11px; color: #475569; }
    .chart-cfg select { background: #0f1117; border: 1px solid #2a3144; border-radius: 4px; color: #7dd3fc; padding: 2px 6px; font-size: 11px; font-family: inherit; }
    .chart-box { position: relative; height: 220px; margin-top: 6px; }
    .out-error { padding: 8px 12px; background: #140505; border: 1px solid #7f1d1d; border-radius: 6px; font-size: 12px; color: #f87171; font-family: monospace; word-break: break-all; }
    .add-bar { display: flex; gap: 8px; justify-content: center; padding: 16px 0 4px; }
    .welcome { padding: 32px 0 20px; text-align: center; color: #334155; }
    .welcome h2 { font-size: 18px; font-weight: 600; color: #475569; margin-bottom: 8px; }
    .welcome p { font-size: 13px; margin-bottom: 20px; }
    .welcome-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .chip { padding: 5px 13px; background: #0d1120; border: 1px solid #1e2533; border-radius: 20px; font-size: 12px; color: #64748b; cursor: pointer; transition: all 0.15s; }
    .chip:hover { border-color: #6366f1; color: #a5b4fc; background: #131a2b; }

    /* Chat */
    #chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-view.hidden { display: none; }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
    .chat-welcome { text-align: center; padding: 32px 0 12px; }
    .chat-welcome h2 { font-size: 18px; font-weight: 600; color: #475569; margin-bottom: 8px; }
    .chat-welcome p { font-size: 13px; color: #334155; margin-bottom: 20px; }
    .chat-welcome-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .chat-msg { display: flex; gap: 10px; align-items: flex-start; }
    .chat-msg.user { flex-direction: row-reverse; }
    .chat-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 2px; }
    .chat-avatar.user { background: #4338ca; color: #fff; }
    .chat-avatar.ai { background: #132010; color: #6ee7b7; border: 1px solid #1a4a25; font-size: 12px; }
    .chat-content { flex: 1; min-width: 0; max-width: 80%; display: flex; flex-direction: column; }
    .chat-msg.user .chat-content { align-items: flex-end; }
    .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.75; word-break: break-word; max-width: 100%; }
    .chat-bubble.user { background: #1e1b4b; border: 1px solid #3730a3; color: #c4c7ff; border-radius: 12px 12px 2px 12px; }
    .chat-bubble.ai  { background: #0d1120; border: 1px solid #1a2030; color: #b0c4d8; border-radius: 12px 12px 12px 2px; white-space: pre-wrap; }
    .chat-bubble.typing { border-radius: 12px 12px 12px 2px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .typing-dot { width: 6px; height: 6px; background: #475569; border-radius: 50%; animation: typingBounce 1.2s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .chat-extras { margin-top: 8px; width: 100%; }
    .chat-sql { margin-bottom: 8px; }
    .chat-sql-hdr { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #334155; cursor: pointer; padding: 2px 0; user-select: none; }
    .chat-sql-hdr:hover { color: #64748b; }
    .chat-sql-body { margin-top: 4px; background: #07090f; border: 1px solid #1e2533; border-radius: 6px; padding: 10px 12px; overflow-x: auto; font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px; color: #7dd3fc; line-height: 1.65; white-space: pre; }
    .chat-result-card { background: #0a0e18; border: 1px solid #1e2533; border-radius: 8px; overflow: hidden; }
    .chat-result-card .res-meta { padding: 8px 12px 2px; }
    .chat-result-card .res-tbl { max-height: 240px; padding: 0 2px; }
    .chat-result-card .res-chart { padding: 4px 12px 12px; }
    .chat-result-card .chart-box { height: 180px; }
    .chat-result-card .chart-cfg { padding: 8px 12px 4px; }
    .chat-input-bar { flex-shrink: 0; padding: 12px 24px 16px; background: #0a0e18; border-top: 1px solid #1e2533; display: flex; gap: 8px; align-items: flex-end; }
    .chat-ta { flex: 1; background: #0f1117; border: 1px solid #2a3144; border-radius: 10px; color: #e2e8f0; padding: 10px 14px; font-size: 13px; resize: none; min-height: 44px; max-height: 160px; font-family: inherit; line-height: 1.6; outline: none; transition: border-color 0.15s; }
    .chat-ta:focus { border-color: #4338ca; }
    .chat-ta::placeholder { color: #1e2d3d; }
    .chat-send-btn { flex-shrink: 0; height: 44px; padding: 0 18px; }

    /* Right Panel */
    .rpanel { width: 0; flex-shrink: 0; background: #0a0e18; border-left: 1px solid #1e2533; display: flex; flex-direction: column; overflow: hidden; transition: width 0.25s ease; }
    .rpanel.open { width: 340px; }
    .rp-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 9px 12px 8px; border-bottom: 1px solid #1e2533; }
    .rp-title { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; }
    .rp-body { flex: 1; overflow-y: auto; padding: 14px; }
    .rp-section { margin-bottom: 18px; }
    .rp-section-label { font-size: 10px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .rp-text { font-size: 12px; color: #818cf8; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
    .rp-empty { font-size: 12px; color: #334155; padding: 12px 0; }

    /* Genie Panel */
    .rp-gtab-bar { display: flex; align-items: center; padding: 0 2px; border-bottom: 1px solid #1e2533; flex-shrink: 0; }
    .rp-gtab { padding: 10px 13px; border: none; background: transparent; color: #475569; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
    .rp-gtab:hover { color: #94a3b8; }
    .rp-gtab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .rp-gclose { margin-left: auto; padding: 5px 10px; background: transparent; border: none; color: #334155; cursor: pointer; font-size: 14px; line-height: 1; }
    .rp-gclose:hover { color: #94a3b8; }
    .rp-gpane { display: none; flex: 1; flex-direction: column; overflow-y: auto; min-height: 0; }
    .rp-gpane.active { display: flex; }


    /* Data pane */
    .data-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; flex-shrink: 0; border-bottom: 1px solid #1e2533; }
    .data-sel-info { font-size: 11px; color: #475569; }
    .data-sel-info span { color: #6366f1; font-weight: 700; }
    .data-list { flex: 1; overflow-y: auto; }
    .data-empty { padding: 24px 14px; text-align: center; font-size: 12px; color: #334155; }
    .data-empty-icon { font-size: 22px; opacity: .2; margin-bottom: 8px; }
    .data-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #0d1120; }
    .data-item-icon { font-size: 12px; color: #6366f1; flex-shrink: 0; margin-top: 1px; }
    .data-item-info { flex: 1; min-width: 0; }
    .data-item-name { font-size: 12px; color: #c8d8e8; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .data-item-conn { font-size: 10px; color: #334155; margin-top: 2px; }
    .data-item-del { flex-shrink: 0; background: transparent; border: none; color: #334155; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
    .data-item-del:hover { color: #f87171; }
    .data-conn-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; background: #131825; border: 1px solid #1e2533; color: #475569; margin-right: 4px; }
    .data-conn-badge.dataverse { border-color: #1e3a6e; color: #60a5fa; background: #0a1020; }



    /* Table picker popup */
    .picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 600; display: flex; align-items: center; justify-content: center; }
    .picker-box { background: #131825; border: 1px solid #2a3144; border-radius: 12px; width: 420px; max-width: 92vw; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
    .picker-head { padding: 16px 18px 12px; border-bottom: 1px solid #1e2533; flex-shrink: 0; }
    .picker-title { font-size: 14px; font-weight: 700; color: #e2e8f0; margin-bottom: 10px; }
    .picker-conn-sel { width: 100%; padding: 7px 10px; background: #0f1117; border: 1px solid #2a3144; border-radius: 6px; color: #94a3b8; font-size: 12px; font-family: inherit; outline: none; margin-bottom: 10px; }
    .picker-conn-sel:focus { border-color: #4338ca; }
    .picker-search { width: 100%; padding: 6px 10px; background: #0f1117; border: 1px solid #2a3144; border-radius: 6px; color: #94a3b8; font-size: 12px; font-family: inherit; outline: none; }
    .picker-search:focus { border-color: #4338ca; }
    .picker-body { flex: 1; overflow-y: auto; }
    .picker-list { }
    .picker-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; border-bottom: 1px solid #0d1120; cursor: pointer; transition: background 0.1s; }
    .picker-item:hover { background: #0d1120; }
    .picker-item.selected { background: #111827; }
    .picker-chk { width: 14px; height: 14px; accent-color: #6366f1; flex-shrink: 0; cursor: pointer; }
    .picker-item-name { flex: 1; font-size: 12px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .picker-item.selected .picker-item-name { color: #a5b4fc; }
    .picker-item-cnt { font-size: 10px; color: #334155; flex-shrink: 0; }
    .picker-empty { padding: 20px; text-align: center; font-size: 12px; color: #334155; }
    .picker-foot { padding: 12px 18px; border-top: 1px solid #1e2533; display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

    /* Toast & Scrollbar */
    .toast { position: fixed; bottom: 18px; right: 18px; z-index: 999; background: #131a2b; border: 1px solid #2a3a60; border-radius: 8px; padding: 9px 15px; font-size: 12px; color: #94a3b8; animation: toastIn 0.2s ease; }
    @keyframes toastIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2533; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">AI Notebook</span>
    </div>
    <div class="h-div"></div>
    <div class="mode-tabs">
      <button class="mode-tab" id="tab-chat" disabled title="기본 모드 준비 중">💬 기본</button>
      <button class="mode-tab active" id="tab-nb" onclick="setMode('notebook')">⌨ 고급</button>
    </div>
    <div class="h-div"></div>
    <div class="nb-only" id="nb-controls" style="display:none">
      <button class="btn primary" onclick="runAll()" id="run-all-btn">▶ Run All</button>
      <button class="btn" onclick="addCell('ai')">＋ AI 셀</button>
      <button class="btn" onclick="addCell('sql')">＋ SQL 셀</button>

    <div class="h-spacer"></div>
    <button class="btn" onclick="toggleSidebar()" title="카탈로그 토글">≡</button>
    <button class="btn" id="rp-toggle-btn" onclick="toggleRPanel()" title="패널 토글" style="display:none">⚙ 설정</button>
    <button class="btn" onclick="newSession()">↺ 새 세션</button>
  </header>

  <div class="body">

    <!-- Sidebar — Catalog -->
    <div class="sidebar" id="sidebar">
      <div class="sb-header">
        <span class="sb-title">Catalog</span>
        <div class="sb-header-actions">
          <button class="btn btn-xs" onclick="loadCatalog()" title="새로고침">↻</button>
        </div>
      </div>
      <div class="sb-body" id="catalog-tree">
        <div class="sb-empty">로딩 중...</div>
      </div>
    </div>
    <div class="sb-resizer" id="sb-resizer"></div>

    <!-- Chat View -->
    <div id="chat-view">
      <div class="chat-area" id="chat-area">
        <div class="chat-welcome" id="chat-welcome">
          <h2>무엇이든 물어보세요</h2>
          <p>오른쪽 Data 탭에서 테이블을 선택 후 자연어로 질문하세요</p>
        </div>
      </div>
      <div class="chat-input-bar">
        <textarea class="chat-ta" id="chat-ta"
          placeholder="자연어로 질문하세요... (Enter 전송, Shift+Enter 줄바꿈)"
          onkeydown="onChatKey(event)" oninput="autoResizeTA(this)" rows="1"></textarea>
        <button class="btn primary chat-send-btn" id="chat-send-btn" onclick="sendChat()">전송</button>
      </div>
    </div>

    <!-- Notebook View -->
    <div id="notebook-view" class="hidden">
      <div class="notebook" id="notebook">
        <div class="nb-inner">
          <div id="welcome-msg" class="welcome">
            <h2>AI Notebook</h2>
            <p>자연어로 질문하거나 SQL을 직접 실행하세요 · <kbd style="background:#1e2533;padding:2px 6px;border-radius:3px;font-size:11px">Shift+Enter</kbd> 실행</p>
          </div>
          <div id="cells"></div>
          <div class="add-bar">
            <button class="btn" onclick="addCell('ai')">＋ AI 셀 추가</button>
            <button class="btn" onclick="addCell('sql')">＋ SQL 셀 추가</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="rpanel open" id="rpanel">

      <!-- Genie Panel (Chat) -->
      <div id="genie-panel" style="display:flex;flex-direction:column;height:100%">
        <div class="rp-gtab-bar">
          <button class="rp-gtab active" id="gtab-data">Data</button>
          <button class="rp-gclose" onclick="closeRPanel()">×</button>
        </div>

        <!-- Data pane -->
        <div class="rp-gpane active" id="rp-gpane-data">
          <div class="data-toolbar">
            <div class="data-sel-info">선택된 테이블: <span id="data-sel-cnt">0</span>개</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-xs" onclick="clearDataSelection()" title="전체 제거">전체 제거</button>
              <button class="btn btn-xs primary" onclick="openTablePicker()">+ 테이블 추가</button>
            </div>
          </div>
          <div class="data-list" id="data-list">
            <div class="data-empty">
              <div class="data-empty-icon">⊞</div>
              <div>분석할 테이블을 추가하세요</div>
              <div style="margin-top:6px;font-size:11px;color:#2a3a50">카탈로그에서 테이블을 선택합니다</div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- ── Table Picker Popup ── -->
<div id="picker-modal" class="picker-overlay" style="display:none" onclick="if(event.target===this)closeTablePicker()">
  <div class="picker-box">
    <div class="picker-head">
      <div class="picker-title">테이블 선택 <span style="font-size:11px;color:#334155;font-weight:400">— Makino Cloud</span></div>
      <input class="picker-search" id="picker-search" type="text" placeholder="🔍 테이블명 또는 한국어로 검색..."
        oninput="filterPickerTables(this.value)">
    </div>
    <div class="picker-body">
      <div class="picker-list" id="picker-list">
        <div class="picker-empty">커넥션을 선택하세요</div>
      </div>
    </div>
    <div class="picker-foot">
      <button class="btn" onclick="closeTablePicker()">취소</button>
      <button class="btn primary" onclick="confirmTablePick()">확인</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let SESSION_ID   = mkUUID();
let EXEC_N       = 0;
let CELL_N       = 0;
let CHAT_N       = 0;
const CELLS      = new Map();
const CHARTS     = new Map();
let _lastFocusedTA = null;
let currentMode  = 'chat';

// Makino Cloud 테이블 카탈로그 (CLAUDE.md 기반)
const MAKINO_CATALOG = [
  { domain: '고객/거래처', icon: '🏢', tables: [
    { name: 'new_q1',  label: '거래처' },
    { name: 'contact', label: '연락처' },
  ]},
  { domain: '영업', icon: '📈', tables: [
    { name: 'new_q4',         label: '영업문의' },
    { name: 'new_q3',         label: '영업기회' },
    { name: 'new_ordersales', label: '수주 (Order Sales)' },
  ]},
  { domain: '서비스', icon: '🔧', tables: [
    { name: 'new_call',  label: '서비스접수' },
    { name: 'new_web',   label: 'Web접수' },
    { name: 'new_q112',  label: '서비스케이스 (A/S)' },
    { name: 'appointment', label: '방문일정 (약속)' },
    { name: 'new_part',  label: '부품사용내역' },
  ]},
  { domain: '장비/설비', icon: '⚙️', tables: [
    { name: 'new_serial',       label: 'Serial 관리' },
    { name: 'new_seriallist',   label: 'Serial 설치정보' },
    { name: 'new_safeinspection', label: '안전점검' },
  ]},
  { domain: '구매', icon: '📦', tables: [
    { name: 'new_po', label: 'P.O 관리' },
  ]},
];

// 전체 테이블 평면 목록
const MAKINO_ALL_TABLES = MAKINO_CATALOG.flatMap(g => g.tables.map(t => ({ ...t, domain: g.domain })));

// Data selection: [{table, label, conn_type}]
let _dataSelection = [];

// Picker state
let _pickerAllItems = [];
let _pickerSelected = new Set(); // table name

function mkUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ─── Mode ────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('chat-view').classList.toggle('hidden', mode !== 'chat');
  document.getElementById('notebook-view').classList.toggle('hidden', mode !== 'notebook');
  document.getElementById('nb-controls').style.display = mode === 'notebook' ? 'flex' : 'none';
  document.getElementById('tab-chat').classList.toggle('active', mode === 'chat');
  document.getElementById('tab-nb').classList.toggle('active', mode === 'notebook');
  const geniePanel = document.getElementById('genie-panel');
  const rpanel     = document.getElementById('rpanel');
  const rpToggle   = document.getElementById('rp-toggle-btn');
  geniePanel.style.display = 'flex';
  rpanel.classList.add('open');
  rpToggle.style.display   = '';
}

// ─── Helpers ─────────────────────────────────────────────
function renderMd(text) {
  if (typeof DOMPurify !== 'undefined' && typeof marked !== 'undefined')
    return DOMPurify.sanitize(marked.parse(text));
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildMessage(question) {
  if (!_dataSelection.length) return question;
  const tables = _dataSelection.map(d => `${d.table}(${d.label})`).join(', ');
  return `[분석 대상 테이블: ${tables}]\n\n${question}`;
}

async function streamChat(message, onText, onTool, onDone, onError) {
  const resp = await fetch('/api/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sessionId: SESSION_ID }),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
      if      (ev.type === 'text')  onText?.(ev.text);
      else if (ev.type === 'tool')  onTool?.(ev.name);
      else if (ev.type === 'done')  onDone?.();
      else if (ev.type === 'error') onError?.(ev.message);
    }
  }
}

// ─── Session ─────────────────────────────────────────────
function newSession() {
  SESSION_ID = mkUUID();
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  const w = document.createElement('div');
  w.id = 'chat-welcome'; w.className = 'chat-welcome';
  w.innerHTML = `<h2>무엇이든 물어보세요</h2>
    <p>오른쪽 Data 탭에서 테이블을 선택 후 자연어로 질문하세요</p>
    <div class="chat-welcome-chips">
      <span class="chip" onclick="quickChat('고객 TOP 5 보여줘')">고객 TOP 5</span>
      <span class="chip" onclick="quickChat('이번달 매출 합계는?')">이번달 매출</span>
      <span class="chip" onclick="quickChat('최근 주문 10건 보여줘')">최근 주문 10건</span>
    </div>`;
  area.appendChild(w);
  CHAT_N = 0;
  CHARTS.forEach(c => c.destroy()); CHARTS.clear();
  CELLS.clear(); EXEC_N = 0; CELL_N = 0;
  document.getElementById('cells').innerHTML = '';
  document.getElementById('welcome-msg').style.display = '';
  if (currentMode === 'notebook') addCell('ai');
  toast('새 세션이 시작되었습니다.');
}

// ─── Sidebar ─────────────────────────────────────────────
let _sbCollapsed = false;
function toggleSidebar() {
  _sbCollapsed = !_sbCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', _sbCollapsed);
}

// ─── Catalog Tree (Makino Cloud) ──────────────────────────
function loadCatalog() {
  // localStorage에서 저장된 기본 테이블 복원
  try {
    const saved = JSON.parse(localStorage.getItem('makino_default_tables') || '[]');
    if (saved.length) { _dataSelection = saved; renderDataList(); }
  } catch {}
  renderCatalogTree();
}

function saveDefaultTables() {
  try { localStorage.setItem('makino_default_tables', JSON.stringify(_dataSelection)); } catch {}
}

function renderCatalogTree() {
  const tree = document.getElementById('catalog-tree');
  // 헤더: Makino Cloud 연결 상태
  tree.innerHTML = `
    <div class="cat-conn">
      <div class="cat-conn-row" style="cursor:default">
        <span class="cat-conn-icon">☁️</span>
        <span class="cat-conn-name">Makino Cloud</span>
        <span class="cat-conn-status connected" title="connected"></span>
      </div>
    </div>` +
  MAKINO_CATALOG.map(g => `
    <div class="cat-conn" id="cat-group-${esc(g.domain)}">
      <div class="cat-conn-row" onclick="toggleGroup('${esc(g.domain)}')">
        <span class="cat-conn-chev" id="cat-chev-${esc(g.domain)}">▶</span>
        <span class="cat-conn-icon">${g.icon}</span>
        <span class="cat-conn-name">${esc(g.domain)}</span>
      </div>
      <div class="cat-tables" id="cat-tables-${esc(g.domain)}">
        ${g.tables.map(t => `
          <div class="cat-table-row" onclick="quickAddToData('${esc(t.name)}','${esc(t.label)}')">
            <span class="cat-table-icon">⊞</span>
            <span class="cat-table-name" title="${esc(t.name)}">${esc(t.label)}</span>
            <span class="cat-table-cnt" style="font-size:9px;color:#2a3a50">${esc(t.name)}</span>
            <button class="cat-table-add" onclick="event.stopPropagation();quickAddToData('${esc(t.name)}','${esc(t.label)}')" title="Data에 추가">＋</button>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleGroup(domain) {
  const tablesEl = document.getElementById(`cat-tables-${domain}`);
  const chevEl   = document.getElementById(`cat-chev-${domain}`);
  const isOpen   = tablesEl.classList.contains('open');
  tablesEl.classList.toggle('open', !isOpen);
  chevEl.classList.toggle('open', !isOpen);
}

function quickAddToData(tableName, label) {
  if (_dataSelection.some(d => d.table === tableName)) {
    toast(`이미 추가됨: ${label}`); return;
  }
  _dataSelection.push({ table: tableName, label, conn_type: 'dataverse' });
  renderDataList();
  saveDefaultTables();
  switchGenieTab('data');
  document.getElementById('rpanel').classList.add('open');
  toast(`추가됨: ${label}`);
}


// ─── Data Panel ───────────────────────────────────────────
function renderDataList() {
  const el = document.getElementById('data-list');
  document.getElementById('data-sel-cnt').textContent = _dataSelection.length;
  if (!_dataSelection.length) {
    el.innerHTML = `<div class="data-empty">
      <div class="data-empty-icon">⊞</div>
      <div>분석할 테이블을 추가하세요</div>
      <div style="margin-top:6px;font-size:11px;color:#2a3a50">카탈로그에서 테이블을 선택합니다</div>
    </div>`;
    return;
  }
  el.innerHTML = _dataSelection.map((d, i) => `
    <div class="data-item">
      <span class="data-item-icon">⊞</span>
      <div class="data-item-info">
        <div class="data-item-name">${esc(d.label || d.table)}</div>
        <div class="data-item-conn">
          <span class="data-conn-badge dataverse">Makino Cloud</span>
          ${esc(d.table)}
        </div>
      </div>
      <button class="data-item-del" onclick="removeDataItem(${i})" title="제거">×</button>
    </div>`).join('');
}

function removeDataItem(i) {
  _dataSelection.splice(i, 1);
  renderDataList();
  saveDefaultTables();
}

function clearDataSelection() {
  _dataSelection = [];
  renderDataList();
  saveDefaultTables();
}

// ─── Table Picker Popup ───────────────────────────────────
function openTablePicker() {
  _pickerSelected = new Set(_dataSelection.map(d => d.table));
  _pickerAllItems = MAKINO_ALL_TABLES;
  document.getElementById('picker-search').value = '';
  renderPickerList(_pickerAllItems);
  document.getElementById('picker-modal').style.display = 'flex';
}

function closeTablePicker() {
  document.getElementById('picker-modal').style.display = 'none';
}

function renderPickerList(items) {
  const el = document.getElementById('picker-list');
  if (!items.length) { el.innerHTML = '<div class="picker-empty">검색 결과 없음</div>'; return; }
  el.innerHTML = items.map(t => {
    const sel = _pickerSelected.has(t.name);
    return `<div class="picker-item ${sel ? 'selected' : ''}" onclick="togglePickerItem('${esc(t.name)}',this)">
      <input type="checkbox" class="picker-chk" ${sel ? 'checked' : ''} onclick="event.stopPropagation();togglePickerItem('${esc(t.name)}',this.closest('.picker-item'))">
      <span class="picker-item-name">
        ${esc(t.label)}
        <span style="color:#2a3a50;font-size:10px;margin-left:6px">${esc(t.name)}</span>
      </span>
      <span class="picker-item-cnt">${esc(t.domain)}</span>
    </div>`;
  }).join('');
}

function togglePickerItem(name, rowEl) {
  if (_pickerSelected.has(name)) {
    _pickerSelected.delete(name);
    rowEl.classList.remove('selected');
    rowEl.querySelector('input[type=checkbox]').checked = false;
  } else {
    _pickerSelected.add(name);
    rowEl.classList.add('selected');
    rowEl.querySelector('input[type=checkbox]').checked = true;
  }
}

function filterPickerTables(q) {
  const filtered = q
    ? MAKINO_ALL_TABLES.filter(t =>
        t.label.toLowerCase().includes(q.toLowerCase()) ||
        t.name.toLowerCase().includes(q.toLowerCase()) ||
        t.domain.toLowerCase().includes(q.toLowerCase()))
    : MAKINO_ALL_TABLES;
  renderPickerList(filtered);
}

function confirmTablePick() {
  _dataSelection = MAKINO_ALL_TABLES
    .filter(t => _pickerSelected.has(t.name))
    .map(t => ({ table: t.name, label: t.label, conn_type: 'dataverse' }));
  renderDataList();
  saveDefaultTables();
  closeTablePicker();
  toast(`${_dataSelection.length}개 테이블 선택됨`);
}

// ─── Chat ─────────────────────────────────────────────────
async function sendChat() {
  const ta = document.getElementById('chat-ta');
  const q = ta.value.trim();
  if (!q) return;
  ta.value = ''; autoResizeTA(ta);
  document.getElementById('chat-welcome') && (document.getElementById('chat-welcome').style.display = 'none');
  appendChatMsg('user', q);
  const typingId = appendTyping();
  document.getElementById('chat-send-btn').disabled = true;
  let mid = null;
  try {
    await streamChat(
      buildMessage(q),
      (text) => {  // onText
        if (mid === null) { removeTyping(typingId); mid = beginStreamBubble(); }
        appendStreamToken(mid, text);
      },
      (name) => {  // onTool
        if (mid === null) { removeTyping(typingId); mid = beginStreamBubble(); }
        const b = document.getElementById(`cbubble-${mid}`);
        if (b) { b.dataset.status = '1'; b.dataset.acc = b.dataset.acc || ''; b.innerHTML = `<span style="color:#475569">🔍 ${esc(name)} 조회 중...</span>`; }
      },
      () => {      // onDone
        if (mid === null) { removeTyping(typingId); mid = beginStreamBubble(); }
        finalizeStreamBubble(mid);
      },
      (msg) => {   // onError
        removeTyping(typingId);
        appendChatMsg('ai', `오류: ${msg}`, true);
      },
    );
  } catch(err) {
    removeTyping(typingId);
    appendChatMsg('ai', `오류: ${err.message}`, true);
  } finally {
    document.getElementById('chat-send-btn').disabled = false;
  }
}

function beginStreamBubble() {
  const mid = ++CHAT_N;
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'chat-msg ai'; div.id = `cmsg-${mid}`;
  div.innerHTML = `<div class="chat-avatar ai">AI</div>
    <div class="chat-content">
      <div class="chat-bubble ai" id="cbubble-${mid}"></div>
      <div class="chat-extras" id="cextras-${mid}"></div>
    </div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
  return mid;
}

function appendStreamToken(mid, text) {
  const bubble = document.getElementById(`cbubble-${mid}`);
  if (!bubble) return;
  if (bubble.dataset.status) { delete bubble.dataset.status; }
  bubble.dataset.acc = (bubble.dataset.acc || '') + text;
  bubble.innerHTML = renderMd(bubble.dataset.acc);
  document.getElementById('chat-area').scrollTop = 9999;
}

function finalizeStreamBubble(mid) {
  const bubble = document.getElementById(`cbubble-${mid}`);
  if (!bubble) return;
  bubble.innerHTML = renderMd(bubble.dataset.acc || bubble.textContent || '');
  document.getElementById('chat-area').scrollTop = 9999;
}

function onChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function quickChat(q) { document.getElementById('chat-ta').value = q; sendChat(); }

function appendChatMsg(role, text, isError = false) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  const bubbleStyle = isError ? ' style="color:#f87171"' : '';
  div.innerHTML = `<div class="chat-avatar ${role}">${role === 'user' ? '나' : 'AI'}</div>
    <div class="chat-content"><div class="chat-bubble ${role}"${bubbleStyle}>${esc(text)}</div></div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
  return div;
}

function appendTyping() {
  const id = ++CHAT_N;
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'chat-msg ai'; div.id = `typing-${id}`;
  div.innerHTML = `<div class="chat-avatar ai">AI</div>
    <div class="chat-content"><div class="chat-bubble typing">
      <div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
    </div></div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
  return id;
}

function removeTyping(id) { document.getElementById(`typing-${id}`)?.remove(); }

function toggleChatSQL(mid) {
  const b = document.getElementById(`csqb-${mid}`);
  const c = document.getElementById(`csc-${mid}`);
  if (!b) return;
  const show = b.style.display === 'none';
  b.style.display = show ? 'block' : 'none';
  c.textContent = show ? '▼' : '▶';
}

function switchChatTab(mid, tab) {
  const card = document.getElementById(`cmsg-${mid}`)?.querySelector('.chat-result-card');
  if (!card) return;
  card.querySelectorAll('.res-tab').forEach((t, i) =>
    t.classList.toggle('active', (tab==='table'&&i===0)||(tab==='chart'&&i===1)));
  document.getElementById(`crt-${mid}`)?.classList.toggle('active', tab === 'table');
  document.getElementById(`crc-${mid}`)?.classList.toggle('active', tab === 'chart');
}

// ─── Notebook ─────────────────────────────────────────────
function addCell(type, text = '') {
  const id = ++CELL_N;
  CELLS.set(id, { type });
  document.getElementById('welcome-msg').style.display = 'none';
  const ph = type === 'ai' ? '자연어로 질문하세요 (예: 고객 TOP 5 보여줘)' : 'SELECT * FROM table_name LIMIT 10';
  const el = document.createElement('div');
  el.className = 'cell'; el.id = `cell-${id}`;
  el.innerHTML = `<div class="cell-hdr">
    <span class="badge ${type}">${type === 'ai' ? 'AI' : 'SQL'}</span>
    <span class="exec-num" id="en-${id}">In [&nbsp;]:</span>
    <span class="cell-preview" id="prev-${id}"></span>
    <div class="cell-acts">
      <button class="btn btn-sm" id="rbtn-${id}" onclick="runCell(${id})">▶ 실행</button>
      <button class="btn btn-sm danger" onclick="deleteCell(${id})">×</button>
    </div>
  </div>
  <div class="cell-in ${type}">
    <textarea class="cell-ta" id="ta-${id}" placeholder="${ph}"
      onkeydown="onCellKey(event,${id})" oninput="autoResizeTA(this);updatePreview(${id})"
      onfocus="_lastFocusedTA=this" rows="2">${text}</textarea>
  </div>
  <div class="cell-out hidden" id="out-${id}"></div>`;
  document.getElementById('cells').appendChild(el);
  const ta = el.querySelector('textarea');
  if (text) { updatePreview(id); autoResizeTA(ta); }
  ta.focus();
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return id;
}

function deleteCell(id) {
  destroyChart(id);
  document.getElementById(`cell-${id}`)?.remove();
  CELLS.delete(id);
  if (!document.getElementById('cells').children.length)
    document.getElementById('welcome-msg').style.display = '';
}

function updatePreview(id) {
  const ta = document.getElementById(`ta-${id}`);
  const prev = document.getElementById(`prev-${id}`);
  if (ta && prev) prev.textContent = ta.value.slice(0, 70);
}

function onCellKey(e, id) {
  if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); runCell(id); }
  if (e.key === 'Tab' && CELLS.get(id)?.type === 'sql') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
  }
}

async function runCell(id) {
  const cell = CELLS.get(id); if (!cell) return;
  const input = document.getElementById(`ta-${id}`)?.value.trim(); if (!input) return;
  const el = document.getElementById(`cell-${id}`);
  const outEl = document.getElementById(`out-${id}`);
  const rBtn = document.getElementById(`rbtn-${id}`);
  const enEl = document.getElementById(`en-${id}`);
  destroyChart(id);
  el.classList.add('running'); el.classList.remove('has-error');
  rBtn.disabled = true; rBtn.textContent = '⏳';
  enEl.innerHTML = 'In [*]:';
  outEl.classList.remove('hidden');
  outEl.innerHTML = `<div class="out-inner"><div class="running-row"><div class="spinner"></div><span>${cell.type === 'ai' ? 'AI 분석 중...' : 'SQL 실행 중...'}</span></div></div>`;
  const n = ++EXEC_N;
  try {
    if (cell.type === 'ai') await runAI(id, input, n);
    else await runSQL(id, input, n);
    enEl.innerHTML = `In [${n}]:`;
    el.classList.remove('running');
  } catch(err) {
    el.classList.remove('running'); el.classList.add('has-error');
    outEl.innerHTML = `<div class="out-inner"><div class="out-error">오류: ${esc(err.message)}</div></div>`;
  } finally { rBtn.disabled = false; rBtn.textContent = '▶ 실행'; }
}

async function runAI(id, question, n) {
  const outEl = document.getElementById(`out-${id}`);
  outEl.innerHTML = '<div class="out-inner"><div class="out-answer"></div></div>';
  const ansEl = outEl.querySelector('.out-answer');
  let acc = '';
  await streamChat(
    buildMessage(question),
    (text) => { acc += text; ansEl.innerHTML = renderMd(acc); outEl.closest('.notebook')?.scrollBy(0, 99); },
    (name) => { ansEl.innerHTML = `<span style="color:#475569">🔍 ${esc(name)} 조회 중...</span>`; },
    ()     => { ansEl.innerHTML = renderMd(acc); },
    (msg)  => { ansEl.innerHTML = `<span style="color:#f87171">오류: ${esc(msg)}</span>`; },
  );
}

async function runSQL(id, sql, n) {
  // SQL 직접 실행 엔드포인트 없음 → Claude에게 실행 요청
  const outEl = document.getElementById(`out-${id}`);
  outEl.innerHTML = '<div class="out-inner"><div class="out-answer"></div></div>';
  const ansEl = outEl.querySelector('.out-answer');
  let acc = '';
  const msg = `다음 SQL을 Dataverse에서 실행하고 결과를 표로 보여줘:\n\`\`\`sql\n${sql}\n\`\`\``;
  await streamChat(
    msg,
    (text) => { acc += text; ansEl.innerHTML = renderMd(acc); },
    (name) => { ansEl.innerHTML = `<span style="color:#475569">🔍 ${esc(name)} 조회 중...</span>`; },
    ()     => { ansEl.innerHTML = renderMd(acc); },
    (msg)  => { ansEl.innerHTML = `<span style="color:#f87171">오류: ${esc(msg)}</span>`; },
  );
}

function renderAIOut(id, d, n) {
  const outEl = document.getElementById(`out-${id}`);
  document.getElementById(`en-${id}`).innerHTML = `Out [${n}]:`;
  const hasRows = d.result?.length > 0;
  const hasCols = hasRows ? Object.keys(d.result[0]) : [];
  const hasChart = d.chart_data?.labels?.length > 0;
  let h = '<div class="out-inner">';
  if (d.answer) h += `<div class="out-answer">${esc(d.answer)}</div>`;
  if (d.sql) h += `<div class="out-sql"><div class="out-sql-hdr" onclick="toggleSQLBlock(${id})">
    <span class="sql-chev" id="sc-${id}">▶</span><span>📝 생성된 SQL</span>
  </div><div class="out-sql-body" id="sqb-${id}" style="display:none">${esc(d.sql)}</div></div>`;
  if (hasRows) {
    h += `<div class="res-meta"><div class="res-tabs">
      <button class="res-tab active" onclick="switchTab(${id},'table')">표</button>
      ${hasChart ? `<button class="res-tab" onclick="switchTab(${id},'chart')">차트</button>` : ''}
    </div><span class="res-stats">${d.result.length}행 · ${d.execution_time_ms}ms</span></div>
    <div class="res-tbl active" id="rt-${id}">${buildTable(hasCols, d.result)}</div>
    ${hasChart ? `<div class="res-chart" id="rc-${id}"><div class="chart-box"><canvas id="cv-${id}"></canvas></div></div>` : ''}`;
  }
  h += '</div>';
  outEl.innerHTML = h;
  if (hasChart) drawChart(`cv-${id}`, d.chart_data);
}

function renderSQLOut(id, d, n) {
  const outEl = document.getElementById(`out-${id}`);
  document.getElementById(`en-${id}`).innerHTML = `Out [${n}]:`;
  if (!d.rows?.length) {
    outEl.innerHTML = `<div class="out-inner"><div class="out-answer" style="color:#334155">결과 없음 (${d.execution_time_ms}ms)</div></div>`;
    return;
  }
  const cell = CELLS.get(id);
  cell.rows = d.rows; cell.columns = d.columns;
  outEl.innerHTML = `<div class="out-inner"><div class="res-meta"><div class="res-tabs">
    <button class="res-tab active">표</button>
  </div><span class="res-stats">${d.row_count}행 · ${d.execution_time_ms}ms</span></div>
  <div class="res-tbl active" id="rt-${id}">${buildTable(d.columns, d.rows)}</div>
  </div>`;
}

function toggleRPanel() { document.getElementById('rpanel').classList.toggle('open'); }

// ─── Shared Helpers ───────────────────────────────────────
function downloadCSV(tblId) {
  const tbl = document.getElementById(tblId)?.querySelector('table'); if (!tbl) return;
  const rows = Array.from(tbl.querySelectorAll('tr')).map(tr =>
    Array.from(tr.querySelectorAll('th,td')).map(c => `"${c.textContent.replace(/"/g,'""')}"`).join(','));
  const blob = new Blob(['﻿' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `result_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
  a.click();
}

function buildTable(cols, rows) {
  if (!rows?.length) return '<div style="color:#334155;font-size:12px;padding:6px 0">결과 없음</div>';
  let h = '<table><thead><tr>' + cols.map(c => `<th>${esc(String(c))}</th>`).join('') + '</tr></thead><tbody>';
  for (const row of rows.slice(0,200))
    h += '<tr>' + cols.map(c => `<td title="${esc(String(row[c]??''))}">${esc(String(row[c]??''))}</td>`).join('') + '</tr>';
  h += '</tbody></table>';
  if (rows.length > 200) h += `<div style="font-size:11px;color:#334155;padding:4px 0">…${rows.length-200}행 더 있음</div>`;
  return h;
}

function switchTab(id, tab) {
  document.querySelectorAll(`#out-${id} .res-tab`).forEach((t,i) =>
    t.classList.toggle('active', (tab==='table'&&i===0)||(tab==='chart'&&i===1)));
  const tbl = document.getElementById(`rt-${id}`);
  const cht = document.getElementById(`rc-${id}`);
  if (tbl) tbl.classList.toggle('active', tab === 'table');
  if (cht) {
    const wasOff = !cht.classList.contains('active');
    cht.classList.toggle('active', tab === 'chart');
    if (tab === 'chart' && wasOff && !CHARTS.has(id)) {
      const cell = CELLS.get(id);
      if (cell?.rows) renderSQLChart(id);
    }
  }
}

function toggleSQLBlock(id) {
  const b = document.getElementById(`sqb-${id}`);
  const c = document.getElementById(`sc-${id}`);
  if (!b) return;
  const show = b.style.display === 'none';
  b.style.display = show ? 'block' : 'none';
  c.textContent = show ? '▼' : '▶';
}

function renderSQLChart(id) {
  const cell = CELLS.get(id); if (!cell?.rows) return;
  const x = document.getElementById(`cx-${id}`)?.value;
  const y = document.getElementById(`cy-${id}`)?.value;
  const t = document.getElementById(`ct-${id}`)?.value || 'bar';
  if (!x || !y) return;
  drawChart(`cv-${id}`, { type: t, title: `${y} by ${x}`,
    labels: cell.rows.slice(0,30).map(r=>String(r[x]??'')),
    data: cell.rows.slice(0,30).map(r=>Number(r[y]??0)) });
}

const _colors = ['#6366f1','#34d399','#f59e0b','#f87171','#38bdf8','#a78bfa','#fb923c','#4ade80'];

function drawChart(canvasId, d) {
  const canvas = document.getElementById(canvasId); if (!canvas) return;
  const existing = Chart.getChart(canvas); if (existing) existing.destroy();
  const isPie = d.type === 'pie' || d.type === 'doughnut';
  new Chart(canvas, {
    type: d.type || 'bar',
    data: { labels: d.labels, datasets: [{ label: d.title||'', data: d.data,
      backgroundColor: isPie ? _colors : _colors[0]+'aa',
      borderColor: isPie ? _colors : _colors[0], borderWidth: 1, tension: 0.35 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#64748b', font: { size: 11 } } },
        title: { display: !!d.title, text: d.title, color: '#64748b', font: { size: 12 } } },
      scales: isPie ? {} : {
        x: { ticks: { color: '#475569', font: { size: 11 } }, grid: { color: '#131825' } },
        y: { ticks: { color: '#475569', font: { size: 11 } }, grid: { color: '#131825' } } } },
  });
}

function destroyChart(id) {
  if (CHARTS.has(id)) { CHARTS.get(id).destroy(); CHARTS.delete(id); }
}

function autoResizeTA(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 280) + 'px';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function toast(msg, ms = 2200) {
  document.querySelector('.toast')?.remove();
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), ms);
}

async function runAll() {
  const btn = document.getElementById('run-all-btn'); btn.disabled = true;
  for (const el of document.querySelectorAll('.cell')) {
    const id = parseInt(el.id.replace('cell-',''));
    if (!isNaN(id)) await runCell(id);
  }
  btn.disabled = false;
}

function clearAll() {
  document.querySelectorAll('.cell-out').forEach(o => { o.classList.add('hidden'); o.innerHTML = ''; });
  CHARTS.forEach(c => c.destroy()); CHARTS.clear(); EXEC_N = 0;
  document.querySelectorAll('.exec-num').forEach(e => { e.innerHTML = 'In [&nbsp;]:'; });
  document.querySelectorAll('.cell').forEach(e => e.classList.remove('running','has-error'));
}

function quickAsk(q) {
  const id = addCell('ai', q); updatePreview(id);
  const ta = document.getElementById(`ta-${id}`); if (ta) autoResizeTA(ta);
  setTimeout(() => runCell(id), 100);
}

// ─── Sidebar resize ───────────────────────────────────────
(function() {
  const resizer = document.getElementById('sb-resizer');
  const sb = document.getElementById('sidebar');
  let sx, sw;
  resizer.addEventListener('mousedown', e => {
    sx = e.clientX; sw = sb.offsetWidth;
    resizer.classList.add('active');
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });
  function mv(e) { sb.style.width = Math.max(140, Math.min(480, sw + e.clientX - sx)) + 'px'; }
  function up()  { resizer.classList.remove('active'); document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); }
})();

setMode('notebook');
loadCatalog();  // 동기: Makino 카탈로그 렌더링 + localStorage 복원
